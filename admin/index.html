<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BilaBilu - Admin</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #nc-root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Carrega o widget de autenticação do Netlify -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <script>
    // Configuração para evitar redirecionamento para a página inicial
    window.netlifyIdentity = window.netlifyIdentity || {};
    window.netlifyIdentity.on = (event, cb) => {
      // Aguarda o widget carregar
      setTimeout(() => {
        if (window.netlifyIdentity && window.netlifyIdentity.on) {
          window.netlifyIdentity.on(event, cb);
        }
      }, 100);
    };

    // Inicializa o widget
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init();
      
      // Se já estiver logado, recarrega para garantir que o CMS seja carregado
      window.netlifyIdentity.on('init', (user) => {
        if (user) {
          // Já logado – recarrega para iniciar o CMS
          if (!window.CMS) {
            setTimeout(() => location.reload(), 500);
          }
        } else {
          // Não logado – abre a janela de login
          window.netlifyIdentity.on('login', () => {
            // Após login, recarrega para o CMS iniciar
            location.reload();
          });
        }
      });
    }
  </script>

  <!-- Carrega o Decap CMS (ele lê automaticamente o config.yml) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
