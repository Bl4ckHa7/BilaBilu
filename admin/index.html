<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BilaBilu - Admin</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #nc-root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Intercepta o redirecionamento após login e força a permanência em /admin/
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (!user) {
          // Se não está logado, aguarda o login
          window.netlifyIdentity.on('login', () => {
            // Após login, verifica se a URL atual é a raiz e redireciona para /admin/
            if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
              window.location.href = '/admin/';
            } else {
              window.location.reload();
            }
          });
        } else {
          // Se já está logado, garante que está em /admin/
          if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
            window.location.href = '/admin/';
          }
        }
      });
      window.netlifyIdentity.init();
    }
  </script>

  <!-- Carrega o Decap CMS (ele lê automaticamente /admin/config.yml) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
